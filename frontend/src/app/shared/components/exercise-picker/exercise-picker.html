<p-multiselect
  styleClass="exercise-picker"
  panelStyleClass="exercise-picker-panel"
  [options]="groups()"
  optionLabel="name"
  dataKey="id"
  [group]="true"
  optionGroupLabel="label"
  optionGroupChildren="items"
  [filter]="true"
  filterPlaceHolder="Buscar ejercicio…"
  [placeholder]="placeholder()"
  display="chip"
  [showToggleAll]="false"
  emptyMessage="No hay ejercicios disponibles"
  emptyFilterMessage="Sin resultados"
  [ngModel]="selection()"
  (ngModelChange)="onSelectionChange($event)"
>
  <ng-template #item let-exercise>
    <span class="picker-dot" [style.background]="dotColor(exercise)"></span>
    {{ exercise.name }}
  </ng-template>
</p-multiselect>
