<div class="loader" [class.compact]="compact()" role="status" [attr.aria-label]="text()">
  <svg class="figure" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
    @switch (variant) {
      @case ('bench') {
        <line class="part floor" x1="14" y1="74" x2="56" y2="74" />
        <line class="part floor" x1="20" y1="74" x2="20" y2="88" />
        <line class="part floor" x1="48" y1="74" x2="48" y2="88" />
        <line class="part floor" x1="6" y1="88" x2="70" y2="88" />
        <circle class="part head" cx="12" cy="67" r="7" />
        <line class="part" x1="19" y1="70" x2="44" y2="70" />
        <line class="part" x1="44" y1="70" x2="55" y2="58" />
        <line class="part" x1="55" y1="58" x2="51" y2="86" />
        <g class="pose pose-a">
          <line class="part" x1="27" y1="70" x2="27" y2="48" />
          <line class="part plate-bar" x1="18" y1="48" x2="36" y2="48" />
          <circle class="part plate" cx="18" cy="48" r="4" />
          <circle class="part plate" cx="36" cy="48" r="4" />
        </g>
        <g class="pose pose-b">
          <line class="part" x1="27" y1="70" x2="14" y2="62" />
          <line class="part" x1="14" y1="62" x2="28" y2="60" />
          <line class="part plate-bar" x1="19" y1="60" x2="35" y2="60" />
          <circle class="part plate" cx="19" cy="60" r="4" />
          <circle class="part plate" cx="35" cy="60" r="4" />
        </g>
      }
      @case ('curl') {
        <line class="part floor" x1="36" y1="92" x2="64" y2="92" />
        <circle class="part head" cx="50" cy="12" r="7" />
        <line class="part" x1="50" y1="19" x2="50" y2="50" />
        <line class="part" x1="50" y1="50" x2="44" y2="90" />
        <line class="part" x1="50" y1="50" x2="56" y2="90" />
        <line class="part" x1="50" y1="24" x2="50" y2="46" />
        <g class="pose pose-a">
          <line class="part" x1="50" y1="46" x2="53" y2="68" />
          <line class="part plate-bar" x1="47" y1="68" x2="59" y2="68" />
          <circle class="part plate" cx="47" cy="68" r="3.5" />
          <circle class="part plate" cx="59" cy="68" r="3.5" />
        </g>
        <g class="pose pose-b">
          <line class="part" x1="50" y1="46" x2="64" y2="32" />
          <line class="part plate-bar" x1="58" y1="26" x2="70" y2="38" />
          <circle class="part plate" cx="58" cy="26" r="3.5" />
          <circle class="part plate" cx="70" cy="38" r="3.5" />
        </g>
      }
      @case ('squat') {
        <line class="part floor" x1="30" y1="92" x2="70" y2="92" />
        <g class="pose pose-a">
          <circle class="part head" cx="50" cy="12" r="7" />
          <line class="part" x1="50" y1="19" x2="50" y2="42" />
          <line class="part" x1="50" y1="25" x2="63" y2="30" />
          <line class="part" x1="50" y1="42" x2="50" y2="64" />
          <line class="part" x1="50" y1="64" x2="50" y2="88" />
        </g>
        <g class="pose pose-b">
          <circle class="part head" cx="48" cy="26" r="7" />
          <line class="part" x1="48" y1="33" x2="46" y2="52" />
          <line class="part" x1="48" y1="38" x2="61" y2="42" />
          <line class="part" x1="46" y1="52" x2="61" y2="64" />
          <line class="part" x1="61" y1="64" x2="50" y2="88" />
        </g>
      }
      @case ('pullup') {
        <line class="part floor" x1="26" y1="8" x2="74" y2="8" />
        <g class="pose pose-a">
          <line class="part" x1="40" y1="11" x2="50" y2="30" />
          <line class="part" x1="60" y1="11" x2="50" y2="30" />
          <circle class="part head" cx="50" cy="38" r="7" />
          <line class="part" x1="50" y1="45" x2="50" y2="68" />
          <line class="part" x1="50" y1="68" x2="45" y2="90" />
          <line class="part" x1="50" y1="68" x2="55" y2="90" />
        </g>
        <g class="pose pose-b">
          <line class="part" x1="40" y1="11" x2="46" y2="22" />
          <line class="part" x1="60" y1="11" x2="54" y2="22" />
          <circle class="part head" cx="50" cy="29" r="7" />
          <line class="part" x1="50" y1="36" x2="50" y2="58" />
          <line class="part" x1="50" y1="58" x2="45" y2="80" />
          <line class="part" x1="50" y1="58" x2="55" y2="80" />
        </g>
      }
      @case ('pushup') {
        <line class="part floor" x1="8" y1="70" x2="92" y2="70" />
        <g class="pose pose-a">
          <line class="part" x1="40" y1="70" x2="28" y2="50" />
          <circle class="part head" cx="18" cy="48" r="7" />
          <line class="part" x1="25" y1="50" x2="65" y2="58" />
          <line class="part" x1="65" y1="58" x2="85" y2="64" />
        </g>
        <g class="pose pose-b">
          <line class="part" x1="40" y1="70" x2="33" y2="58" />
          <circle class="part head" cx="23" cy="57" r="7" />
          <line class="part" x1="30" y1="59" x2="68" y2="63" />
          <line class="part" x1="68" y1="63" x2="85" y2="64" />
        </g>
      }
      @case ('dips') {
        <line class="part floor" x1="25" y1="14" x2="25" y2="58" />
        <line class="part floor" x1="75" y1="14" x2="75" y2="58" />
        <g class="pose pose-a">
          <line class="part" x1="25" y1="18" x2="40" y2="28" />
          <line class="part" x1="75" y1="18" x2="60" y2="28" />
          <circle class="part head" cx="50" cy="20" r="7" />
          <line class="part" x1="50" y1="27" x2="50" y2="52" />
          <line class="part" x1="50" y1="52" x2="43" y2="78" />
          <line class="part" x1="50" y1="52" x2="57" y2="78" />
        </g>
        <g class="pose pose-b">
          <line class="part" x1="25" y1="18" x2="38" y2="40" />
          <line class="part" x1="75" y1="18" x2="62" y2="40" />
          <circle class="part head" cx="50" cy="32" r="7" />
          <line class="part" x1="50" y1="39" x2="50" y2="62" />
          <line class="part" x1="50" y1="62" x2="43" y2="86" />
          <line class="part" x1="50" y1="62" x2="57" y2="86" />
        </g>
      }
    }
  </svg>
  @if (text()) {
    <div class="loader-text">{{ text() }}</div>
  }
</div>
