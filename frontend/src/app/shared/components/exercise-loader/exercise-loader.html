<div class="loader" [class.compact]="compact()" role="status" [attr.aria-label]="text()">
  <svg class="figure" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
    @switch (variant) {
      @case ('bench') {
        <line class="part bar" x1="30" y1="32" x2="70" y2="32" />
        <g class="bench-press">
          <line class="part" x1="40" y1="58" x2="40" y2="34" />
          <line class="part" x1="60" y1="58" x2="60" y2="34" />
        </g>
        <circle class="part head" cx="18" cy="58" r="8" />
        <line class="part" x1="26" y1="58" x2="70" y2="58" />
        <line class="part" x1="70" y1="58" x2="86" y2="49" />
        <line class="part" x1="86" y1="49" x2="96" y2="62" />
        <line class="part floor" x1="6" y1="68" x2="100" y2="68" />
      }
      @case ('curl') {
        <circle class="part head" cx="50" cy="18" r="8" />
        <line class="part" x1="50" y1="26" x2="48" y2="62" />
        <line class="part" x1="48" y1="62" x2="38" y2="92" />
        <line class="part" x1="48" y1="62" x2="60" y2="92" />
        <line class="part" x1="50" y1="34" x2="38" y2="58" />
        <g class="curl-arm">
          <line class="part" x1="55" y1="36" x2="68" y2="60" />
          <g class="curl-forearm">
            <line class="part" x1="68" y1="60" x2="78" y2="76" />
          </g>
        </g>
      }
      @case ('squat') {
        <g class="squat-body">
          <circle class="part head" cx="50" cy="14" r="8" />
          <line class="part" x1="50" y1="22" x2="50" y2="50" />
          <line class="part" x1="38" y1="34" x2="50" y2="30" />
          <line class="part" x1="62" y1="34" x2="50" y2="30" />
        </g>
        <g class="squat-leg-l">
          <line class="part" x1="50" y1="50" x2="40" y2="78" />
          <line class="part" x1="40" y1="78" x2="40" y2="92" />
        </g>
        <g class="squat-leg-r">
          <line class="part" x1="50" y1="50" x2="60" y2="78" />
          <line class="part" x1="60" y1="78" x2="60" y2="92" />
        </g>
        <line class="part floor" x1="22" y1="92" x2="78" y2="92" />
      }
      @case ('pullup') {
        <line class="part bar" x1="28" y1="10" x2="72" y2="10" />
        <g class="pullup-body">
          <line class="part" x1="40" y1="10" x2="50" y2="28" />
          <line class="part" x1="60" y1="10" x2="50" y2="28" />
          <circle class="part head" cx="50" cy="36" r="8" />
          <line class="part" x1="50" y1="44" x2="50" y2="72" />
          <line class="part" x1="50" y1="72" x2="42" y2="94" />
          <line class="part" x1="50" y1="72" x2="58" y2="94" />
        </g>
      }
      @case ('pushup') {
        <g class="pushup-body">
          <circle class="part head" cx="16" cy="40" r="8" />
          <line class="part" x1="24" y1="42" x2="70" y2="48" />
          <line class="part" x1="70" y1="48" x2="88" y2="40" />
          <line class="part" x1="40" y1="44" x2="40" y2="64" />
          <line class="part" x1="64" y1="47" x2="64" y2="64" />
        </g>
        <line class="part floor" x1="8" y1="66" x2="96" y2="66" />
      }
      @case ('dips') {
        <line class="part bar" x1="20" y1="18" x2="20" y2="50" />
        <line class="part bar" x1="80" y1="18" x2="80" y2="50" />
        <g class="dips-body">
          <line class="part" x1="20" y1="30" x2="40" y2="40" />
          <line class="part" x1="80" y1="30" x2="60" y2="40" />
          <circle class="part head" cx="50" cy="22" r="8" />
          <line class="part" x1="50" y1="30" x2="50" y2="55" />
          <line class="part" x1="50" y1="55" x2="42" y2="80" />
          <line class="part" x1="50" y1="55" x2="58" y2="80" />
        </g>
      }
    }
  </svg>
  @if (text()) {
    <div class="loader-text">{{ text() }}</div>
  }
</div>
