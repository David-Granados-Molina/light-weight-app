<div class="page">
  <div class="brand">
    <img src="icons/light-weight-icon.svg" width="56" height="56" alt="" class="brand-icon" />
    <span class="brand-name">Light Weight</span>
  </div>

  <h1 class="title">Restablecer contraseña</h1>

  @if (tokenMissing) {
    <div class="error">El enlace no es válido o ha caducado.</div>
    <div class="footer-link"><a routerLink="/recuperar">Solicitar un enlace nuevo</a></div>
  } @else if (success()) {
    <div class="success">Contraseña actualizada correctamente.</div>
  } @else {
    <p class="subtitle">Introduce tu nueva contraseña</p>

    <label class="field-label">Nueva contraseña</label>
    <input
      class="text-input"
      type="password"
      placeholder="Mínimo 8 caracteres"
      autocomplete="new-password"
      [value]="password()"
      (input)="onPasswordInput($event)"
    />

    <label class="field-label">Confirmar contraseña</label>
    <input
      class="text-input"
      type="password"
      placeholder="••••••••"
      autocomplete="new-password"
      [value]="confirmPassword()"
      (input)="onConfirmPasswordInput($event)"
      (keydown.enter)="submit()"
    />

    @if (error()) {
      <div class="error">{{ error() }}</div>
    }

    <button type="button" class="primary-btn" [disabled]="loading()" (click)="submit()">
      {{ loading() ? 'Guardando…' : 'Restablecer contraseña' }}
    </button>
  }
</div>
