<div class="page">
  <div class="brand">
    <img src="icons/light-weight-icon.svg" width="56" height="56" alt="" class="brand-icon" />
    <span class="brand-name">Light Weight</span>
  </div>

  <h1 class="title">Crear cuenta</h1>
  <p class="subtitle">Empieza a registrar tus entrenos</p>

  <label class="field-label">Nombre</label>
  <input
    class="text-input"
    type="text"
    placeholder="Tu nombre"
    autocomplete="name"
    [value]="name()"
    (input)="onNameInput($event)"
  />

  <label class="field-label">Email</label>
  <input
    class="text-input"
    type="email"
    placeholder="tucorreo@ejemplo.com"
    autocomplete="email"
    [value]="email()"
    (input)="onEmailInput($event)"
  />

  <label class="field-label">Contraseña</label>
  <input
    class="text-input"
    type="password"
    placeholder="Mínimo 8 caracteres"
    autocomplete="new-password"
    [value]="password()"
    (input)="onPasswordInput($event)"
  />

  <label class="field-label">Confirmar contraseña</label>
  <input
    class="text-input"
    type="password"
    placeholder="••••••••"
    autocomplete="new-password"
    [value]="confirmPassword()"
    (input)="onConfirmPasswordInput($event)"
    (keydown.enter)="submit()"
  />

  @if (error()) {
    <div class="error">{{ error() }}</div>
  }

  <button type="button" class="primary-btn" [disabled]="loading()" (click)="submit()">
    {{ loading() ? 'Creando cuenta…' : 'Crear cuenta' }}
  </button>

  @if (googleAvailable) {
    <div class="divider">o</div>
    <div class="google-btn-wrap" #googleBtn></div>
  }

  <div class="footer-link">¿Ya tienes cuenta? <a routerLink="/login">Iniciar sesión</a></div>
</div>
