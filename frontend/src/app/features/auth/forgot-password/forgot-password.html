<div class="page">
  <div class="brand">
    <img src="icons/light-weight-icon.svg" width="56" height="56" alt="" class="brand-icon" />
    <span class="brand-name">Light Weight</span>
  </div>

  <h1 class="title">Recuperar contraseña</h1>
  <p class="subtitle">Te enviaremos un enlace para restablecerla</p>

  @if (sent()) {
    <div class="success">
      Si existe una cuenta con ese email, recibirás un enlace para restablecer tu contraseña.
    </div>
  } @else {
    <label class="field-label">Email</label>
    <input
      class="text-input"
      type="email"
      placeholder="tucorreo@ejemplo.com"
      autocomplete="email"
      [value]="email()"
      (input)="onEmailInput($event)"
      (keydown.enter)="submit()"
    />

    @if (error()) {
      <div class="error">{{ error() }}</div>
    }

    <button type="button" class="primary-btn" [disabled]="loading()" (click)="submit()">
      {{ loading() ? 'Enviando…' : 'Enviar enlace' }}
    </button>
  }

  <div class="footer-link"><a routerLink="/login">Volver a iniciar sesión</a></div>
</div>
