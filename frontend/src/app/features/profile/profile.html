<div class="page">
  <div class="header">
    <a routerLink="/inicio" class="back" aria-label="Volver">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 18l-6-6 6-6" />
      </svg>
    </a>
    <h1 class="title">Perfil</h1>
  </div>

  <div class="avatar-section">
    <label class="avatar-wrap" for="avatar-input">
      @if (avatarUrl()) {
      <img [src]="avatarUrl()" alt="" class="avatar-img" />
      } @else {
      <span class="avatar-fallback">{{ initial() }}</span>
      }
    </label>
    <span class="avatar-edit">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 20h9" />
        <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z" />
      </svg>
    </span>
    <input id="avatar-input" type="file" accept="image/png,image/jpeg,image/webp" class="visually-hidden"
      (change)="onPhotoSelected($event)" />
    @if (avatarUrl()) {
    <button type="button" class="remove-photo-btn" (click)="removePhoto()">Quitar foto</button>
    }
  </div>

  <label class="field-label">Nombre</label>
  <input class="text-input" type="text" placeholder="Tu nombre" [value]="name()" (input)="onNameInput($event)" />

  <label class="field-label">Email</label>
  <input class="text-input" type="email" [value]="email()" disabled />

  @if (error()) {
  <div class="error">{{ error() }}</div>
  }
  @if (success()) {
  <div class="success">Cambios guardados.</div>
  }

  <button type="button" class="save-btn" [disabled]="!canSave()" (click)="save()">
    {{ saving() ? 'Guardando…' : 'Guardar cambios' }}
  </button>

  <div class="section-label">Cuenta</div>
  <div class="options-list">
    <button type="button" class="option-row" (click)="goRecover()">
      <span>Cambiar contraseña</span>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 6l6 6-6 6" />
      </svg>
    </button>
  </div>

  <button type="button" class="logout-btn" (click)="logout()">Cerrar sesión</button>

  @if (cropSrc()) {
    <div class="crop-overlay">
      <div class="crop-sheet">
        <div class="crop-title">Encuadra tu foto</div>
        <div
          class="crop-viewport"
          [style.width.px]="cropViewport"
          [style.height.px]="cropViewport"
          (pointerdown)="onCropPointerDown($event)"
          (pointermove)="onCropPointerMove($event)"
          (pointerup)="onCropPointerUp()"
          (pointercancel)="onCropPointerUp()"
        >
          <img
            [src]="cropSrc()"
            alt=""
            class="crop-img"
            [style.width.px]="cropDispWidth()"
            [style.height.px]="cropDispHeight()"
            [style.transform]="'translate(' + cropOffset().x + 'px, ' + cropOffset().y + 'px)'"
          />
        </div>
        <input
          class="crop-zoom"
          type="range"
          min="1"
          max="3"
          step="0.05"
          [value]="cropZoom()"
          (input)="onZoomInput($event)"
        />
        <button type="button" class="saved-primary" (click)="confirmCrop()">Usar esta foto</button>
        <button type="button" class="saved-secondary" (click)="cancelCrop()">Cancelar</button>
      </div>
    </div>
  }
</div>
