<div class="page">
  <div class="header">
    <h1 class="title">Rutinas</h1>
  </div>

  <a routerLink="/rutinas/nueva" class="cta">+ Nueva rutina</a>

  @if (loading()) {
    <app-exercise-loader />
  } @else {
    <div class="routine-list">
      @for (r of rows(); track r.id) {
        <a [routerLink]="['/rutinas', r.id]" class="routine-card" [style.border-left-color]="categoryColor[r.category]">
          <div class="routine-top">
            <span class="routine-cat" [style.color]="categoryColor[r.category]">
              <span class="dot" [style.background]="categoryColor[r.category]"></span>{{ categoryLabel[r.category] }}
            </span>
            <button type="button" class="remove-btn" (click)="askDeleteRoutine(r.id, $event)" aria-label="Eliminar rutina">✕</button>
          </div>
          <div class="routine-name">{{ r.name }}</div>
          @if (r.count) {
            <div class="routine-exercises">{{ r.exercisesText }}</div>
          }
          <div class="routine-count">{{ r.count }} ejercicios</div>
        </a>
      } @empty {
        <div class="empty">Todavía no tienes rutinas. Crea la primera.</div>
      }
    </div>
  }
</div>

@if (confirmDeleteId() !== null) {
  <app-confirm-dialog
    title="Eliminar rutina"
    message="Esta acción no se puede deshacer. ¿Seguro que quieres eliminar la rutina?"
    (confirmed)="confirmDeleteRoutine()"
    (cancelled)="cancelDeleteRoutine()"
  />
}
