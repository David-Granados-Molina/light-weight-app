<!doctype html>
<html lang="es" class="app-dark">
<head>
  <meta charset="utf-8">
  <title>LIGHT WEIGHT</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0B0B0B">
  <link rel="icon" type="image/svg+xml" href="icons/light-weight-icon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16x16.png">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    .app-boot-splash {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: #0b0b0b;
      font-family: system-ui, sans-serif;
    }
    .app-boot-spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #232323;
      border-top-color: #ffbf00;
      border-radius: 50%;
      animation: app-boot-spin 0.8s linear infinite;
    }
    .app-boot-text {
      color: #6b6b6b;
      font-size: 14px;
      letter-spacing: 0.3px;
    }
    @keyframes app-boot-spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <app-root>
    <div class="app-boot-splash">
      <img src="icons/light-weight-icon.svg" width="48" height="48" alt="" style="border-radius: 12px;">
      <div class="app-boot-spinner"></div>
      <div class="app-boot-text">Cargando…</div>
    </div>
  </app-root>
</body>
</html>
